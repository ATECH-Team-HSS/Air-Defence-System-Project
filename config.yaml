video:
  source: 0
  frame_width: 1280
  frame_height: 720
  window_name: "Balloon Detection"
  model_path: "models/best.pt"
  class_names:
    - "Blue Balloon"
    - "Red Balloon"
  confidence_threshold: 0.5
  iou_threshold: 0.45
  device: "auto"

tracking:
  max_age: 1
  iou_threshold: 0.3

targeting:
  min_bbox_width: 20
  min_bbox_height: 20
  color_strategy: "red_only"
  confirmation_duration: 0.3
  startup_delay_seconds: 1.0
  x_tolerance: 50
  y_tolerance: 50

crosshair:
  x: 640
  y: 360
  size: 60
  inner_radius: 20
  outer_radius: 40

safety:
  enabled: true
  forbidden_fire_zone:
    enabled: true
    rect: [0, 0, 0, 0]

auxiliary_vision:
  qr_roi: [100, 50, 180, 180]
  shape_roi: [320, 50, 180, 180]
  window_name: "Task Command Demo"

future_serial:
  enabled: false
  port: ""
  baud_rate: 115200
